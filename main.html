<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <title>Stevesidian</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top-bar">
        <div id="search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 15 15" fill="none"
                stroke="whitesmoke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="4"></circle>
                <line x1="9" y1="9" x2="13" y2="13"></line>
            </svg>
            <input type="text" id="file-search-bar-input">
        </div>
        <button id="save-file-top-bar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="whitesmoke" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 15 2 H 3 C 2.45 2 2 2.45 2 3 V 17 C 2 17.55 2.45 18 3 18 H 17 C 17.55 18 18 17.55 18 17 V 5 L 15 2 Z" />
                <polyline points="6 2 6 6 12 6 12 2" />
                <rect x="6" y="11" width="8" height="7" />
            </svg>
        </button>
        <button id="toggle-editor">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20" fill="none"
                stroke="whitesmoke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 30,6 L 34,10 L 14,30 L 6,34 L 10,26 Z" />
                <line x1="25" y1="11" x2="29" y2="15" />
                <line x1="9" y1="31" x2="13" y2="27" />
            </svg>
        </button>
        <button id="toggle-preview">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20" fill="none"
                stroke="whitesmoke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 4,20 Q 20,6 36,20 Q 20,34 4,20 Z" />
                <circle cx="20" cy="20" r="5" />
            </svg>

        </button>
    </div>
    <div id="div-row-body">
        <div id="side-tool-bar">
            <button id="file-explorer-button" class="side-bar-button">
                <svg class="fileExplorerSvg" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 30 30" fill="none" stroke="whitesmoke" stroke-width="2" stroke-linejoin="round"
                    stroke-linecap="round">
                    <path d="M 3 8 L 11 8 L 15 12 L 27 12 L 27 25 L 3 25 Z" />
                </svg>
            </button>
            <button id="tool-bar-new-file-button" class="side-bar-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20" fill="none"
                    stroke="whitesmoke" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 10,4 L 22,4 L 30,12 L 30,36 L 10,36 Z" />
                    <polyline points="22,4 22,12 30,12" />
                    <line x1="15" y1="24" x2="25" y2="24" />
                    <line x1="20" y1="19" x2="20" y2="29" />
                </svg>
            </button>
            <button id="git-hub-button" class="side-bar-button">
                <svg class="gitHubSvg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="whitesmoke">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </button>
        </div>
        <div id="file-explorer">
            <div id="file-explorer-tool-bar">
                <button class="file-explorer-tool-bar-button" id="fe-new-folder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 30 30" fill="none"
                        stroke="whitesmoke" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
                        <path d="M 3 8 L 11 8 L 15 12 L 27 12 L 27 25 L 3 25 Z" />
                        <line x1="11" y1="19" x2="19" y2="19"></line>
                        <line x1="15" y1="15" x2="15" y2="23"></line>
                    </svg>
                </button>
                <button class="file-explorer-tool-bar-button" id="fe-new-file">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="15" height="15" fill="none"
                        stroke="whitesmoke" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 10,4 L 22,4 L 30,12 L 30,36 L 10,36 Z" />
                        <polyline points="22,4 22,12 30,12" />
                        <line x1="15" y1="24" x2="25" y2="24" />
                        <line x1="20" y1="19" x2="20" y2="29" />
                    </svg>
                </button>
                <button class="file-explorer-tool-bar-button" id="fe-tab-view">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 30 30" fill="none"
                        stroke="whitesmoke" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
                        <rect x="3" y="3" width="10" height="10" rx="2" ry="2" />
                        <rect x="17" y="3" width="10" height="10" rx="2" ry="2" />
                        <rect x="3" y="17" width="10" height="10" rx="2" ry="2" />
                        <rect x="17" y="17" width="10" height="10" rx="2" ry="2" />
                    </svg>
                </button>
                <button class="file-explorer-tool-bar-button" id="fe-sort-order">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 30 30" fill="none"
                        stroke="whitesmoke" stroke-width="2" stroke-linecap="round">
                        <line x1="6" y1="8" x2="18" y2="8" />
                        <line x1="6" y1="15" x2="22" y2="15" />
                        <line x1="6" y1="22" x2="26" y2="22" />
                    </svg>
                </button>
            </div>
        </div>
        <div id="editor-name-input-div">
            <input type="text" id="editor-name-input" placeholder="untitled.md">
            <div id="main-editor-div-wrapper">
                <textarea name="mainText" id="main-editor-text-area"></textarea>
                <div id="main-editor-div"></div>
            </div>
        </div>
        <div id="right-side-bar"></div>
    </div>
    <script type="module" src="./renderer.js"></script>
</body>

</html>
