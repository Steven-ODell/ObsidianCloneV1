<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <title>Stevesidian</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top-bar">
        <button id="top-bar-new-file"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20"
                fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 10,4 L 22,4 L 30,12 L 30,36 L 10,36 Z" />
                <polyline points="22,4 22,12 30,12" />
                <line x1="15" y1="24" x2="25" y2="24" />
                <line x1="20" y1="19" x2="20" y2="29" />
            </svg>
        </button>
        <button id="toggle-editor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20"
                fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 30,6 L 34,10 L 14,30 L 6,34 L 10,26 Z" />
                <line x1="25" y1="11" x2="29" y2="15" />
                <line x1="9" y1="31" x2="13" y2="27" />
            </svg>
        </button>
        <button id="toggle-preview"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="20" height="20"
                fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M 4,20 Q 20,6 36,20 Q 20,34 4,20 Z" />
                <circle cx="20" cy="20" r="5" />
            </svg>

        </button>
    </div>
    <div id="div-row-body">
        <div id="side-tool-bar"></div>
        <div id="file-explorer"></div>
        <div id="main-editor-div-wrapper">
            <textarea name="mainText" id="main-editor-text-area"></textarea>
            <div id="main-editor-div"></div>
        </div>
        <div id="right-side-bar"></div>
    </div>
    <script type="module" src="MainParserV3.js"></script>
</body>

</html>
